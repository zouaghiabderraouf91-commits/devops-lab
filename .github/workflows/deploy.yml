name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Stack
        run: |
          cd ~/projects/webstack
          git pull origin main
          docker compose down
          docker compose up -d --build
          docker compose ps
