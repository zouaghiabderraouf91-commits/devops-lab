services:
  app:
    build: ./app
    container_name: devops-app
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./logs/app:/var/log/app
    networks:
      - webnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  nginx:
    image: nginx:alpine
    container_name: devops-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./logs/nginx:/var/log/nginx
    networks:
      - webnet
    depends_on:
      - app

networks:
  webnet:
    driver: bridge
