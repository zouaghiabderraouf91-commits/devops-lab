global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # مقاييس Prometheus نفسه
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # مقاييس السيرفر
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  # مقاييس Docker Containers
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
